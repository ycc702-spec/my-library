<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Impact Map - 市場因果關係圖</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a0f; --bg-card: #14141a; --bg-hover: #1e1e28;
            --border: rgba(255,255,255,0.08); --text-primary: #ffffff; --text-secondary: #8b8b9a;
            --accent-green: #22c55e; --accent-red: #ef4444; --accent-gold: #f59e0b;
            --accent-blue: #3b82f6; --accent-purple: #8b5cf6; --accent-cyan: #06b6d4;
        }
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg-dark); color: var(--text-primary);
            min-height: 100vh; overflow: hidden;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-red));
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .logo-text {
            font-size: 1.1rem; font-weight: 700;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-red));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-actions { display: flex; gap: 12px; }
        .btn {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-primary); font-size: 0.875rem;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 6px;
        }
        .btn:hover { background: var(--bg-hover); border-color: var(--accent-gold); }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), #d97706);
            border: none; color: #000; font-weight: 600;
        }
        .btn-primary:hover { opacity: 0.9; }
        .container { display: flex; height: 100vh; padding-top: 60px; }
        .sidebar {
            width: 340px; background: var(--bg-card); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-title {
            font-size: 0.875rem; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
        }
        .scenario-tabs {
            display: flex; gap: 8px; flex-wrap: wrap; max-height: 120px; overflow-y: auto;
        }
        .scenario-tab {
            padding: 6px 12px; border-radius: 6px; background: var(--bg-hover);
            border: 1px solid var(--border); font-size: 0.75rem; cursor: pointer;
            transition: all 0.2s ease;
        }
        .scenario-tab:hover, .scenario-tab.active {
            background: var(--accent-gold); color: #000; border-color: var(--accent-gold);
        }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 20px; }
        .event-list { display: flex; flex-direction: column; gap: 8px; }
        .event-item {
            padding: 12px; background: var(--bg-hover); border-radius: 10px;
            border: 1px solid var(--border); cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 10px;
        }
        .event-item:hover { border-color: var(--accent-gold); transform: translateX(4px); }
        .event-item.active { border-color: var(--accent-cyan); background: rgba(6, 182, 212, 0.1); }
        .event-icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
        }
        .event-icon.trigger { background: rgba(239, 68, 68, 0.2); }
        .event-icon.chain { background: rgba(245, 158, 11, 0.2); }
        .event-icon.impact { background: rgba(34, 197, 94, 0.2); }
        .event-icon.asset { background: rgba(59, 130, 246, 0.2); }
        .event-info { flex: 1; }
        .event-name { font-weight: 500; font-size: 0.875rem; }
        .event-type { font-size: 0.75rem; color: var(--text-secondary); }
        .legend { padding: 20px; border-top: 1px solid var(--border); }
        .legend-title { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 12px; }
        .legend-items { display: flex; flex-direction: column; gap: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .main { flex: 1; position: relative; overflow: hidden; }
        #graph-container { width: 100%; height: 100%; }
        .info-panel {
            position: absolute; top: 20px; right: 20px; width: 360px;
            background: rgba(20, 20, 26, 0.95); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 16px; padding: 20px;
            transform: translateX(400px); transition: transform 0.3s ease;
            max-height: calc(100vh - 100px); overflow-y: auto;
        }
        .info-panel.active { transform: translateX(0); }
        .info-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
        }
        .info-icon {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .info-title { font-size: 1.125rem; font-weight: 600; }
        .info-type { font-size: 0.75rem; color: var(--text-secondary); }
        .info-section { margin-bottom: 16px; }
        .info-section-title {
            font-size: 0.75rem; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
        }
        .info-desc { font-size: 0.875rem; line-height: 1.6; color: var(--text-secondary); }
        .impact-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .impact-tab {
            padding: 6px 12px; border-radius: 6px; background: var(--bg-hover);
            border: 1px solid var(--border); font-size: 0.75rem; cursor: pointer;
        }
        .impact-tab.active { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); }
        .impact-list { display: flex; flex-direction: column; gap: 6px; }
        .impact-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; background: var(--bg-hover); border-radius: 8px;
            font-size: 0.875rem; cursor: pointer; transition: all 0.2s ease;
        }
        .impact-item:hover { border: 1px solid var(--accent-cyan); }
        .impact-arrow { color: var(--accent-red); }
        .impact-arrow.up { color: var(--accent-green); }
        .impact-arrow.down { color: var(--accent-red); }
        .impact-arrow.bidirectional { color: var(--accent-cyan); }
        .loop-badge {
            font-size: 0.65rem; padding: 2px 6px; border-radius: 4px;
            background: var(--accent-purple); color: #fff; margin-left: auto;
        }
        .sources-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .sources-list { display: flex; flex-direction: column; gap: 6px; }
        .source-link {
            font-size: 0.75rem; color: var(--accent-blue); text-decoration: none;
            display: flex; align-items: center; gap: 6px;
        }
        .source-link:hover { text-decoration: underline; }
        .tooltip {
            position: absolute; padding: 12px 16px;
            background: rgba(20, 20, 26, 0.95); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 10px;
            font-size: 0.875rem; pointer-events: none; opacity: 0;
            transition: opacity 0.2s ease; z-index: 1000; max-width: 280px;
        }
        .tooltip.visible { opacity: 1; }
        .connection-info {
            background: var(--bg-hover); border-radius: 8px; padding: 12px;
            margin-bottom: 12px; font-size: 0.8rem;
        }
        .connection-type {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.7rem; margin-right: 8px;
        }
        .connection-type.direct { background: rgba(239, 68, 68, 0.3); }
        .connection-type.indirect { background: rgba(245, 158, 11, 0.3); }
        .connection-type.feedback { background: rgba(139, 92, 246, 0.3); }
        @media (max-width: 1024px) {
            .sidebar { width: 280px; }
            .info-panel { width: 300px; }
        }
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -340px; height: calc(100% - 60px); transition: left 0.3s ease; z-index: 100; }
            .sidebar.open { left: 0; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🎯</div>
            <div class="logo-text">Market Impact Map</div>
        </div>
        <div class="header-actions">
            <button class="btn" onclick="resetZoom()"><span>🔍</span> 重置視圖</button>
            <button class="btn btn-primary" onclick="toggleAnimation()"><span>▶️</span> 播放動畫</button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">情境選擇</div>
                <div class="scenario-tabs">
                    <div class="scenario-tab active" data-scenario="oil">🛢️ 油價上漲</div>
                    <div class="scenario-tab" data-scenario="war">⚔️ 地緣衝突</div>
                    <div class="scenario-tab" data-scenario="fed">🏦 Fed政策</div>
                    <div class="scenario-tab" data-scenario="inflation">📈 通膨升溫</div>
                    <div class="scenario-tab" data-scenario="ai">🤖 AI熱潮</div>
                    <div class="scenario-tab" data-scenario="china">🇨🇳 中國經濟</div>
                    <div class="scenario-tab" data-scenario="japan">🇯🇵 日本升息</div>
                </div>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-title">事件節點</div>
                <div class="event-list" id="event-list"></div>
            </div>
            <div class="legend">
                <div class="legend-title">圖例說明</div>
                <div class="legend-items">
                    <div class="legend-item"><div class="legend-dot" style="background: #ef4444;"></div><span>觸發事件 (Trigger)</span></div>
                    <div class="legend-item"><div class="legend-dot" style="background: #f59e0b;"></div><span>連鎖反應 (Chain)</span></div>
                    <div class="legend-item"><div class="legend-dot" style="background: #22c55e;"></div><span>最終影響 (Impact)</span></div>
                    <div class="legend-item"><div class="legend-dot" style="background: #3b82f6;"></div><span>資產價格 (Asset)</span></div>
                    <div class="legend-item"><div class="legend-dot" style="background: #8b5cf6;"></div><span>回饋迴路 (Feedback Loop)</span></div>
                </div>
            </div>
        </aside>

        <main class="main">
            <div id="graph-container"></div>
            <div class="info-panel" id="info-panel">
                <div class="info-header">
                    <div class="info-icon" id="info-icon">📊</div>
                    <div>
                        <div class="info-title" id="info-title">選擇節點</div>
                        <div class="info-type" id="info-type">點擊圖表查看詳情</div>
                    </div>
                </div>
                <div class="info-section">
                    <div class="info-section-title">描述</div>
                    <div class="info-desc" id="info-desc">點擊圖表中的節點，查看該事件如何影響市場，以及與其他事件的關聯。</div>
                </div>
                <div class="connection-info" id="connection-info" style="display: none;">
                    <span class="connection-type" id="connection-type"></span>
                    <span id="connection-desc"></span>
                </div>
                <div class="info-section">
                    <div class="info-section-title">影響關係</div>
                    <div class="impact-tabs">
                        <div class="impact-tab active" data-tab="outgoing">影響其他 →</div>
                        <div class="impact-tab" data-tab="incoming">← 被影響</div>
                        <div class="impact-tab" data-tab="bidirectional">↔ 互相影響</div>
                    </div>
                    <div class="impact-list" id="impact-list"></div>
                </div>
                <div class="sources-section" id="sources-section" style="display: none;">
                    <div class="info-section-title">資料來源</div>
                    <div class="sources-list" id="sources-list"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
// 市場因果關係數據 - 包含雙向影響與回饋迴路
const scenarios = {
    oil: {
        name: "油價上漲情境",
        description: "地緣政治緊張或供應中斷導致油價飆升，推升通膨預期並影響Fed政策",
        sources: [
            { name: "財經M平方 - 油價與通膨關係", url: "https://www.macromicro.me/collections/4534/em-mkt/37411/us-dollar-index-vs-em-mkt-idx" },
            { name: "Mitrade - 美國降息對股市影響", url: "https://www.mitrade.com/zh/insights/shares/us-stock-investment/Impact-of-interest-rate-cuts-on-stock-market" }
        ],
        nodes: [
            { id: "oil_price", name: "油價大漲", type: "trigger", icon: "🛢️", desc: "地緣政治緊張、OPEC減產或需求激增導致原油價格飆升。油價每上漲5%，已開發市場通膨率約增加0.1個百分點。", x: 100, y: 300 },
            { id: "transport_cost", name: "運輸成本上升", type: "chain", icon: "🚛", desc: "燃油成本增加直接推高物流與運輸費用，影響供應鏈各環節", x: 300, y: 200 },
            { id: "production_cost", name: "生產成本增加", type: "chain", icon: "🏭", desc: "能源密集型產業（化工、塑膠、航空）成本上升，企業利潤受壓", x: 300, y: 400 },
            { id: "cpi_up", name: "CPI上升", type: "chain", icon: "📊", desc: "消費者物價指數因能源與商品價格上漲而攀升，若油價升至每桶108美元，美國通膨率可能突破2%目標", x: 500, y: 300 },
            { id: "inflation_exp", name: "通膨預期升溫", type: "chain", icon: "📈", desc: "市場預期未來通膨將持續走高，影響長期利率預期", x: 700, y: 250 },
            { id: "fed_delay", name: "Fed降息延後", type: "chain", icon: "🏦", desc: "聯準會因通膨壓力而推遲降息時間表（6月→9月或更晚），甚至全年可能0次降息", x: 700, y: 400 },
            { id: "bond_yield", name: "債券收益率上升", type: "impact", icon: "📉", desc: "市場預期利率維持高位，債券價格下跌，收益率攀升", x: 900, y: 350 },
            { id: "stock_pressure", name: "股市承壓", type: "impact", icon: "📉", desc: "高利率環境與成本上升雙重打擊企業盈利，科技股估值受壓", x: 900, y: 200 },
            { id: "usd_strength", name: "美元走強", type: "impact", icon: "💵", desc: "美國利率相對較高吸引資金流入，美元指數上升", x: 900, y: 500 },
            { id: "gold", name: "黃金上漲", type: "asset", icon: "🥇", desc: "避險需求與通膨對沖推升金價，實質利率下降時黃金機會成本降低", x: 1100, y: 300 },
            { id: "oil_stocks", name: "能源股上漲", type: "asset", icon: "⛽", desc: "油價上漲直接利好石油生產商，獲利預期改善", x: 1100, y: 150 },
            { id: "airlines", name: "航空股下跌", type: "asset", icon: "✈️", desc: "燃油成本上升重創航空公司利潤，營運成本大幅增加", x: 1100, y: 450 },
            { id: "consumer", name: "消費股疲軟", type: "asset", icon: "🛒", desc: "通膨侵蝕購買力，消費支出放緩，零售業績受影響", x: 1100, y: 600 }
        ],
        links: [
            // 主要因果鏈
            { source: "oil_price", target: "transport_cost", strength: 0.9, type: "direct" },
            { source: "oil_price", target: "production_cost", strength: 0.9, type: "direct" },
            { source: "transport_cost", target: "cpi_up", strength: 0.7, type: "direct" },
            { source: "production_cost", target: "cpi_up", strength: 0.8, type: "direct" },
            { source: "cpi_up", target: "inflation_exp", strength: 0.9, type: "direct" },
            { source: "cpi_up", target: "fed_delay", strength: 0.8, type: "direct" },
            { source: "inflation_exp", target: "bond_yield", strength: 0.8, type: "direct" },
            { source: "fed_delay", target: "bond_yield", strength: 0.9, type: "direct" },
            { source: "fed_delay", target: "stock_pressure", strength: 0.8, type: "direct" },
            { source: "fed_delay", target: "usd_strength", strength: 0.7, type: "direct" },
            { source: "inflation_exp", target: "gold", strength: 0.8, type: "direct" },
            { source: "oil_price", target: "oil_stocks", strength: 0.9, type: "direct" },
            { source: "oil_price", target: "airlines", strength: -0.9, type: "direct" },
            { source: "stock_pressure", target: "consumer", strength: 0.7, type: "direct" },
            // 回饋迴路與交叉影響
            { source: "usd_strength", target: "oil_price", strength: -0.6, type: "feedback", desc: "美元走強使油價對非美買家更貴，抑制需求" },
            { source: "bond_yield", target: "stock_pressure", strength: 0.7, type: "indirect", desc: "債券收益率上升增加股票風險溢價要求" },
            { source: "consumer", target: "cpi_up", strength: -0.5, type: "feedback", desc: "消費疲軟可能壓抑物價上漲壓力" },
            { source: "gold", target: "inflation_exp", strength: 0.4, type: "feedback", desc: "金價上漲強化通膨預期心理" },
            { source: "stock_pressure", target: "fed_delay", strength: -0.5, type: "feedback", desc: "股市大跌可能迫使Fed提前降息" }
        ]
    },
    war: {
        name: "地緣衝突情境",
        description: "區域戰爭或軍事衝突升級，引發避險情緒與供應鏈中斷",
        sources: [
            { name: "天下雜誌 - 地緣政治衝突分析", url: "https://www.cw.com.tw/article/5140113" },
            { name: "Visual Capitalist - 戰爭與股市", url: "https://www.visualcapitalist.com/cp/stock-market-performance-during-war/" }
        ],
        nodes: [
            { id: "conflict", name: "地緣衝突爆發", type: "trigger", icon: "⚔️", desc: "區域戰爭或軍事衝突突然升級，市場不確定性急劇升高", x: 100, y: 300 },
            { id: "oil_supply", name: "石油供應中斷", type: "chain", icon: "🛢️", desc: "主要產油區運輸受阻或生產設施受損，全球供應鏈受衝擊", x: 300, y: 200 },
            { id: "safe_haven", name: "避險情緒升溫", type: "chain", icon: "🛡️", desc: "投資者尋求安全資產避險，風險偏好急劇下降", x: 300, y: 400 },
            { id: "oil_spike", name: "油價暴漲", type: "chain", icon: "📈", desc: "供應擔憂推升原油價格，能源成本急遽上升", x: 500, y: 200 },
            { id: "volatility", name: "市場波動率飆升", type: "chain", icon: "⚡", desc: "VIX指數大幅上漲，市場恐慌情緒蔓延", x: 500, y: 400 },
            { id: "inflation_war", name: "戰時通膨", type: "chain", icon: "🔥", desc: "能源與糧食價格雙雙上漲，輸入性通膨壓力加劇", x: 700, y: 300 },
            { id: "defense", name: "軍工股大漲", type: "asset", icon: "🎖️", desc: "國防開支增加預期，軍工企業訂單看增", x: 900, y: 150 },
            { id: "gold_war", name: "黃金暴漲", type: "asset", icon: "🥇", desc: "避險需求激增，資金湧入黃金等避險資產", x: 900, y: 300 },
            { id: "bonds", name: "美債上漲", type: "asset", icon: "📜", desc: "資金湧入避險，美國公債需求增加", x: 900, y: 450 },
            { id: "emerging", name: "新興市場下跌", type: "asset", icon: "📉", desc: "風險資產遭拋售，新興市場資金外流", x: 1100, y: 200 },
            { id: "semiconductor", name: "半導體股波動", type: "asset", icon: "💻", desc: "供應鏈中斷擔憂，晶片產業面臨不確定性", x: 1100, y: 400 }
        ],
        links: [
            { source: "conflict", target: "oil_supply", strength: 0.9, type: "direct" },

            { source: "nasdaq", target: "unwind", strength: 0.7, type: "feedback", desc: "美股下跌加速套息交易平倉" }
        ]
    }
};

let currentScenario = 'oil';
let simulation = null;
let selectedNode = null;
let currentImpactTab = 'outgoing';

const colors = { trigger: '#ef4444', chain: '#f59e0b', impact: '#22c55e', asset: '#3b82f6' };
const linkColors = { direct: '#ef4444', indirect: '#f59e0b', feedback: '#8b5cf6' };

function init() {
    renderEventList();
    renderGraph();
    setupEventListeners();
}

function renderEventList() {
    const list = document.getElementById('event-list');
    const nodes = scenarios[currentScenario].nodes;
    list.innerHTML = nodes.map(node => `
        <div class="event-item" data-id="${node.id}">
            <div class="event-icon ${node.type}">${node.icon}</div>
            <div class="event-info">
                <div class="event-name">${node.name}</div>
                <div class="event-type">${getTypeLabel(node.type)}</div>
            </div>
        </div>
    `).join('');
}

function getTypeLabel(type) {
    const labels = { trigger: '觸發事件', chain: '連鎖反應', impact: '最終影響', asset: '資產價格' };
    return labels[type] || type;
}

function getLinkTypeLabel(type) {
    const labels = { direct: '直接影響', indirect: '間接影響', feedback: '回饋迴路' };
    return labels[type] || type;
}

function renderGraph() {
    const container = document.getElementById('graph-container');
    container.innerHTML = '';
    const width = container.clientWidth;
    const height = container.clientHeight;
    
    const svg = d3.select('#graph-container')
        .append('svg')
        .attr('width', width)
        .attr('height', height)
        .call(d3.zoom().on('zoom', (e) => { g.attr('transform', e.transform); }));

    const g = svg.append('g');
    const data = scenarios[currentScenario];
    const nodes = data.nodes.map(d => ({...d}));
    const links = data.links.map(d => ({...d}));

    simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(130))
        .force('charge', d3.forceManyBody().strength(-900))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(55));

    // 繪製連結
    const link = g.append('g')
        .selectAll('line')
        .data(links)
        .enter()
        .append('line')
        .attr('stroke', d => linkColors[d.type] || '#666')
        .attr('stroke-width', d => Math.abs(d.strength) * 2.5)
        .attr('stroke-dasharray', d => d.type === 'feedback' ? '8,4' : (d.strength < 0 ? '5,5' : null))
        .attr('opacity', 0.7);

    // 繪製箭頭
    svg.append('defs').selectAll('marker')
        .data(['direct', 'indirect', 'feedback'])
        .enter()
        .append('marker')
        .attr('id', d => `arrow-${d}`)
        .attr('viewBox', '0 -5 10 10')
        .attr('refX', 32)
        .attr('refY', 0)
        .attr('markerWidth', 7)
        .attr('markerHeight', 7)
        .attr('orient', 'auto')
        .append('path')
        .attr('d', 'M0,-5L10,0L0,5')
        .attr('fill', d => linkColors[d]);

    link.attr('marker-end', d => `url(#arrow-${d.type})`);

    // 繪製節點
    const node = g.append('g')
        .selectAll('g')
        .data(nodes)
        .enter()
        .append('g')
        .attr('class', 'node')
        .style('cursor', 'pointer')
        .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

    node.append('circle')
        .attr('r', 26)
        .attr('fill', d => colors[d.type])
        .attr('stroke', '#fff')
        .attr('stroke-width', 2)
        .style('filter', 'drop-shadow(0 4px 8px rgba(0,0,0,0.3))');

    node.append('text')
        .attr('text-anchor', 'middle')
        .attr('dy', '0.35em')
        .style('font-size', '1.1rem')
        .style('pointer-events', 'none')
        .text(d => d.icon);

    node.append('text')
        .attr('dy', 42)
        .attr('text-anchor', 'middle')
        .style('font-size', '0.7rem')
        .style('fill', '#fff')
        .style('font-weight', '500')
        .style('text-shadow', '0 2px 4px rgba(0,0,0,0.8)')
        .text(d => d.name);

    node.on('click', (e, d) => { e.stopPropagation(); selectNode(d); });
    node.on('mouseenter', (e, d) => { showTooltip(e, d); });
    node.on('mouseleave', () => { hideTooltip(); });

    simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    svg.on('click', () => {
        document.getElementById('info-panel').classList.remove('active');
        selectedNode = null;
        document.querySelectorAll('.event-item').forEach(el => el.classList.remove('active'));
    });
}

function selectNode(node) {
    selectedNode = node;
    const panel = document.getElementById('info-panel');
    const scenario = scenarios[currentScenario];
    
    // 更新事件列表高亮
    document.querySelectorAll('.event-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === node.id);
    });
    
    document.getElementById('info-icon').textContent = node.icon;
    document.getElementById('info-icon').style.background = `${colors[node.type]}33`;
    document.getElementById('info-title').textContent = node.name;
    document.getElementById('info-type').textContent = getTypeLabel(node.type);
    document.getElementById('info-desc').textContent = node.desc;

    // 顯示連結資訊
    const connectionInfo = document.getElementById('connection-info');
    const totalConnections = scenario.links.filter(l => 
        l.source.id === node.id || l.source === node.id ||
        l.target.id === node.id || l.target === node.id
    ).length;
    
    if (totalConnections > 0) {
        connectionInfo.style.display = 'block';
        document.getElementById('connection-desc').textContent = 
            `此節點共有 ${totalConnections} 個連結（點擊下方標籤查看不同類型）`;
    } else {
        connectionInfo.style.display = 'none';
    }

    renderImpactList();

    // 顯示資料來源
    const sourcesSection = document.getElementById('sources-section');
    const sourcesList = document.getElementById('sources-list');
    if (scenario.sources && scenario.sources.length > 0) {
        sourcesSection.style.display = 'block';
        sourcesList.innerHTML = scenario.sources.map(s => `
            <a href="${s.url}" target="_blank" class="source-link">
                <span>🔗</span> ${s.name}
            </a>
        `).join('');
    } else {
        sourcesSection.style.display = 'none';
    }

    panel.classList.add('active');
}

function renderImpactList() {
    if (!selectedNode) return;
    
    const scenario = scenarios[currentScenario];
    const impactList = document.getElementById('impact-list');
    
    let filteredLinks = [];
    
    if (currentImpactTab === 'outgoing') {
        // 此節點影響其他
        filteredLinks = scenario.links.filter(l => 
            (l.source.id === selectedNode.id || l.source === selectedNode.id)
        );
    } else if (currentImpactTab === 'incoming') {
        // 其他節點影響此節點
        filteredLinks = scenario.links.filter(l => 
            (l.target.id === selectedNode.id || l.target === selectedNode.id)
        );
    } else if (currentImpactTab === 'bidirectional') {
        // 互相影響（回饋迴路）
        filteredLinks = scenario.links.filter(l => 
            l.type === 'feedback' && (
                l.source.id === selectedNode.id || l.source === selectedNode.id ||
                l.target.id === selectedNode.id || l.target === selectedNode.id
            )
        );
    }
    
    if (filteredLinks.length > 0) {
        impactList.innerHTML = filteredLinks.map(l => {
            let targetNode, direction, arrow;
            
            if (currentImpactTab === 'outgoing') {
                targetNode = typeof l.target === 'object' ? l.target : scenario.nodes.find(n => n.id === l.target);
                direction = l.strength > 0 ? 'up' : 'down';
                arrow = l.strength > 0 ? '↑' : '↓';
            } else if (currentImpactTab === 'incoming') {
                targetNode = typeof l.source === 'object' ? l.source : scenario.nodes.find(n => n.id === l.source);
                direction = l.strength > 0 ? 'down' : 'up'; // 反向
                arrow = l.strength > 0 ? '↓' : '↑';
            } else {
                // bidirectional
                const isSource = l.source.id === selectedNode.id || l.source === selectedNode.id;
                targetNode = isSource 
                    ? (typeof l.target === 'object' ? l.target : scenario.nodes.find(n => n.id === l.target))
                    : (typeof l.source === 'object' ? l.source : scenario.nodes.find(n => n.id === l.source));
                direction = 'bidirectional';
                arrow = '↔';
            }
            
            return `
                <div class="impact-item" onclick="highlightNode('${targetNode.id}')">
                    <span>${targetNode.icon}</span>
                    <span class="impact-arrow ${direction}">${arrow}</span>
                    <span>${targetNode.name}</span>
                    ${l.type === 'feedback' ? '<span class="loop-badge">回饋</span>' : ''}
                </div>
            `;
        }).join('');
    } else {
        impactList.innerHTML = `<div class="impact-item">此分類下無連結</div>`;
    }
}

function highlightNode(nodeId) {
    const node = scenarios[currentScenario].nodes.find(n => n.id === nodeId);
    if (node) selectNode(node);
}

function showTooltip(e, d) {
    const tooltip = document.getElementById('tooltip');
    const scenario = scenarios[currentScenario];
    const outgoing = scenario.links.filter(l => l.source.id === d.id || l.source === d.id).length;
    const incoming = scenario.links.filter(l => l.target.id === d.id || l.target === d.id).length;
    const feedback = scenario.links.filter(l => 
        l.type === 'feedback' && (l.source.id === d.id || l.source === d.id || l.target.id === d.id || l.target === d.id)
    ).length;
    
    tooltip.innerHTML = `
        <strong>${d.icon} ${d.name}</strong><br>
        <span style="color: #8b8b9a; font-size: 0.75rem;">${getTypeLabel(d.type)}</span><br>
        <span style="font-size: 0.75rem; color: #666;">
            影響: ${outgoing} | 被影響: ${incoming} | 回饋: ${feedback}
        </span>
    `;
    tooltip.style.left = e.pageX + 10 + 'px';
    tooltip.style.top = e.pageY - 10 + 'px';
    tooltip.classList.add('visible');
}

function hideTooltip() {
    document.getElementById('tooltip').classList.remove('visible');
}

function dragstarted(e, d) {
    if (!e.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
}

function dragged(e, d) {
    d.fx = e.x; d.fy = e.y;
}

function dragended(e, d) {
    if (!e.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
}

function setupEventListeners() {
    document.querySelectorAll('.scenario-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentScenario = tab.dataset.scenario;
            renderEventList();
            renderGraph();
            document.getElementById('info-panel').classList.remove('active');
            selectedNode = null;
        });
    });

    document.getElementById('event-list').addEventListener('click', (e) => {
        const item = e.target.closest('.event-item');
        if (item) {
            const nodeId = item.dataset.id;
            const node = scenarios[currentScenario].nodes.find(n => n.id === nodeId);
            if (node) selectNode(node);
        }
    });

    // 影響分類標籤
    document.querySelectorAll('.impact-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.impact-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentImpactTab = tab.dataset.tab;
            renderImpactList();
        });
    });
}

function resetZoom() {
    renderGraph();
}

let animationPlaying = false;
function toggleAnimation() {
    animationPlaying = !animationPlaying;
    const btn = document.querySelector('.btn-primary');
    btn.innerHTML = animationPlaying ? '<span>⏸️</span> 暫停動畫' : '<span>▶️</span> 播放動畫';
    
    if (animationPlaying) {
        const nodes = d3.selectAll('.node circle');
        function pulse() {
            if (!animationPlaying) return;
            nodes.transition().duration(1000).attr('r', 30)
                .transition().duration(1000).attr('r', 26)
                .on('end', pulse);
        }
        pulse();
    } else {
        d3.selectAll('.node circle').interrupt().attr('r', 26);
    }
}

init();
window.addEventListener('resize', () => { renderGraph(); });
    </script>
</body>
</html>
